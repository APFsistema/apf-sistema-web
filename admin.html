<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin APF</title><style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,Arial;background:#06130e;color:#f4fff8}.wrap{width:min(1100px,94vw);margin:auto;padding:18px 0}.head{display:flex;justify-content:space-between;gap:12px;align-items:center}.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#b7ff3c,#19c46b);display:grid;place-items:center;color:#06130e;font-weight:1000}.nav,.row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.btn{border:1px solid #b7ff3c55;background:#0b2118;color:#f4fff8;border-radius:12px;padding:10px 12px;font-weight:900;cursor:pointer;text-decoration:none}.primary{background:linear-gradient(135deg,#b7ff3c,#19c46b);color:#06130e;border:0}.danger{background:#421818;color:#ffd1d1}.warn{background:#38290d;color:#ffe08a}.small{font-size:12px;padding:7px 10px}.card{background:#0d251b;border:1px solid #b7ff3c55;border-radius:18px;padding:14px;margin:14px 0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.field label{display:block;color:#a8c0b4;font-size:12px;margin-bottom:4px}.field input,.field select{width:100%;padding:10px;border-radius:10px;border:1px solid #b7ff3c33;background:#06130e;color:white}.item{background:#071d13;border:1px solid #ffffff22;border-radius:14px;padding:12px;margin:8px 0}.item span{display:block;color:#a8c0b4;font-size:12px;margin-top:3px}.badge{display:inline-block;margin-top:6px;border-radius:999px;padding:5px 8px;background:#b7ff3c22;color:#b7ff3c;font-size:11px;font-weight:900}.status{padding:10px;border:1px solid #b7ff3c44;border-radius:12px;color:#a8c0b4}.bad{color:#ff8a8a}.ok{color:#b7ff3c}.points{font-size:28px;color:#b7ff3c;font-weight:1000}.empty{border:1px dashed #b7ff3c55;border-radius:12px;padding:14px;color:#a8c0b4;text-align:center}
body.tv{overflow:hidden;background:#020806}.tvbox{height:100vh;display:grid;grid-template-rows:14vh 1fr 10vh;background:radial-gradient(circle at top,#1e5a70,#13256b 45%,#060817)}.tvtop,.tvbot{display:flex;justify-content:space-between;align-items:center;padding:2vh 3vw;background:#0005}.tvmain{display:grid;grid-template-columns:1fr 14vw 1fr}.team{display:grid;grid-template-rows:auto 1fr auto;padding:3vh 3vw}.team.srv{background:#b7ff3c18}.pair{text-align:center;font-size:5vh;font-weight:1000}.names{text-align:center;color:#a8c0b4;font-size:2vh}.pt{text-align:center;font-size:14vh;color:#b7ff3c;font-weight:1000}.center{display:grid;place-items:center;border-left:1px solid #fff2;border-right:1px solid #fff2}.sets{text-align:center}.sets b{font-size:3vh}.pill{border:1px solid #b7ff3c55;border-radius:999px;padding:1vh 1.2vw;color:#b7ff3c;background:#b7ff3c18;font-weight:900}
@media(max-width:760px){.head{display:block}.grid{grid-template-columns:1fr}.tvbox{height:auto;min-height:100vh}.tvmain{grid-template-columns:1fr}.center{display:none}.team{min-height:60vh}.pt{font-size:10vh}}
</style></head><body><div id="adminApp"></div><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="config.js"></script><script>
const L=["0","15","30","40"],$=id=>document.getElementById(id);
function cfg(){return window.APF_FIREBASE_CONFIG&&window.APF_FIREBASE_CONFIG.apiKey&&!window.APF_FIREBASE_CONFIG.apiKey.includes("PEGAR_")}
function db(){if(!cfg()||!window.firebase)return null;if(!firebase.apps.length)firebase.initializeApp(window.APF_FIREBASE_CONFIG);return firebase.database()}
function st(t,ok){let e=$("status");if(e){e.className="status "+(ok?"ok":"bad");e.textContent=t}}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function uid(){return "m_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7)}
function norm(m){return Object.assign({points:[0,0],games:[[0,0],[0,0],[0,0]],currentSet:0,setsWon:[0,0],serving:0,seconds:0,status:"Programado",publicVisible:false,running:false},m||{})}
function pt(m,t){let p=m.points||[0,0];return p[0]===3&&p[1]===3?"ORO":(L[p[t]||0]||"0")}
function inf(m){return [m.competition,m.branch,m.category,m.court,m.phase,m.time].filter(Boolean).join(" · ")}
function title(m){return (m.team1||"Pareja A")+" vs "+(m.team2||"Pareja B")}
function fmt(s){return String(Math.floor((s||0)/60)).padStart(2,"0")+":"+String((s||0)%60).padStart(2,"0")}
function listen(cb){let d=db();if(!d){st("La página abre. Falta configurar Firebase en config.js para que sea online.",false);cb([]);return}st("Conectado online",true);d.ref("matches").on("value",snap=>{let v=snap.val()||{};cb(Object.keys(v).map(id=>norm(Object.assign({id},v[id]))).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)))})}
async function upd(id,p){let d=db();if(!d)return alert("Falta configurar Firebase en config.js");await d.ref("matches/"+id).update(Object.assign(p,{updatedAt:Date.now()}))}
function card(m,mode){let set=m.currentSet||0, done=m.status==="Finalizado";let controls=mode==="plan"?`<div class=row><button class='btn small primary' data-a=point data-t=0 data-id='${m.id}'>+ Punto A</button><button class='btn small primary' data-a=point data-t=1 data-id='${m.id}'>+ Punto B</button><button class='btn small' data-a=game data-t=0 data-id='${m.id}'>+ Juego A</button><button class='btn small' data-a=game data-t=1 data-id='${m.id}'>+ Juego B</button><button class='btn small warn' data-a=serve data-id='${m.id}'>Cambiar saque</button></div>`:"";return `<div class=item><b>${esc(title(m))}</b><span>${esc(inf(m))}</span><span>${esc((m.p1||"A1")+" / "+(m.p2||"A2")+" vs "+(m.p3||"B1")+" / "+(m.p4||"B2"))}</span><span class=badge>${esc(m.status)}</span><div class=row><div><span>${esc(m.team1||"Pareja A")}: ${(m.games[set]||[0,0])[0]} games</span><span>${esc(m.team2||"Pareja B")}: ${(m.games[set]||[0,0])[1]} games</span></div><div class=points>${pt(m,0)} - ${pt(m,1)}</div></div>${controls}<div class=row><a class='btn small primary' href='tv.html#${m.id}' target=_blank>TV</a>${!done?`<button class='btn small primary' data-a=start data-id='${m.id}'>Arrancar / En vivo</button><button class='btn small warn' data-a=pause data-id='${m.id}'>${m.running?"Pausar":"Reanudar"}</button><button class='btn small danger' data-a=finish data-id='${m.id}'>Finalizar</button>`:""}${mode==="admin"?`<button class='btn small danger' data-a=delete data-id='${m.id}'>Eliminar</button>`:""}</div></div>`}
function acts(arr){document.querySelectorAll("[data-a]").forEach(b=>b.onclick=async()=>{let m=arr.find(x=>x.id===b.dataset.id),a=b.dataset.a,t=Number(b.dataset.t||0);if(!m)return;if(a==="delete"){if(confirm("¿Eliminar?"))await db().ref("matches/"+m.id).remove();return}if(a==="start")return upd(m.id,{status:"En vivo",publicVisible:true,running:true,startedAt:m.startedAt||Date.now()});if(a==="pause")return upd(m.id,{running:!m.running});if(a==="finish"){if(confirm("¿Finalizar?"))return upd(m.id,{status:"Finalizado",publicVisible:false,running:false,finishedAt:Date.now()});return}if(a==="serve")return upd(m.id,{serving:m.serving?0:1});if(a==="point")return point(m,t);if(a==="game")return game(m,t)})}
async function point(m,t){if(m.status==="Programado"){m.status="En vivo";m.publicVisible=true;m.running=true}let p=m.points||[0,0],o=t?0:1;if(p[0]===3&&p[1]===3)return game(m,t);if(p[t]===3&&p[o]<3)return game(m,t);p[t]=Math.min(3,(p[t]||0)+1);return upd(m.id,{points:p,status:m.status,publicVisible:m.publicVisible,running:m.running})}
async function game(m,t){let g=m.games||[[0,0],[0,0],[0,0]],s=m.currentSet||0,sets=m.setsWon||[0,0];g[s][t]++;let a=g[s][0],b=g[s][1],mx=Math.max(a,b),df=Math.abs(a-b);let p={games:g,points:[0,0],serving:m.serving?0:1};if((mx>=6&&df>=2)||mx>=7){sets[t]++;p.setsWon=sets;if(sets[t]>=2||s>=2){p.status="Finalizado";p.publicVisible=false;p.running=false;p.finishedAt=Date.now()}else p.currentSet=s+1}return upd(m.id,p)}
function tick(){let d=db();if(!d)return;d.ref("matches").once("value",s=>{let v=s.val()||{};Object.keys(v).forEach(id=>{let m=v[id];if(m&&m.running&&m.status==="En vivo")d.ref("matches/"+id+"/seconds").transaction(x=>(x||0)+1)})})}
function header(title,sub,nav){return `<div class=wrap><div class=head><div class=brand><div class=logo>APF</div><div><h1>${title}</h1><p>${sub}</p></div></div><div class=nav>${nav||""}</div></div><div id=status class=status>Conectando...</div>`}
function admin(){if(!$("adminApp"))return;$("adminApp").innerHTML=header("APF Marcador Online","Admin: crear partido y controlar.",`<a class=btn href=planillero.html>Planillero</a><a class=btn href=publico.html>Público</a><a class=btn href=tv.html>TV</a>`)+`<div class=card><h2>Crear marcador</h2><div class=grid>${["competition:Competencia","branch:Rama","category:Categoría","court:Cancha","phase:Instancia","time:Hora","format:Formato","team1:Pareja A","team2:Pareja B","p1:Jugador A1","p2:Jugador A2","p3:Jugador B1","p4:Jugador B2","sponsor:Sponsor"].map(x=>{let [id,l]=x.split(":");return `<div class=field><label>${l}</label><input id=${id}></div>`}).join("")}</div><div class=row><button class='btn primary' id=create>Crear marcador</button></div></div><div class=card><h2>Marcadores creados</h2><div id=list class=list></div></div><div class=card><h2>Finalizados</h2><div id=done class=list></div></div></div>`;$("create").onclick=async()=>{let d=db();if(!d)return alert("Falta configurar Firebase en config.js");let m={competition:$("competition").value||"Sin competencia",branch:$("branch").value,category:$("category").value,court:$("court").value,phase:$("phase").value,time:$("time").value,format:$("format").value||"Mejor de 3 sets",team1:$("team1").value||"Pareja A",team2:$("team2").value||"Pareja B",p1:$("p1").value,p2:$("p2").value,p3:$("p3").value,p4:$("p4").value,sponsor:$("sponsor").value||"ESPACIO SPONSOR",status:"Programado",publicVisible:false,running:false,points:[0,0],games:[[0,0],[0,0],[0,0]],currentSet:0,setsWon:[0,0],serving:0,seconds:0,createdAt:Date.now()};await d.ref("matches/"+uid()).set(m);alert("Marcador creado")};listen(arr=>{let a=arr.filter(x=>x.status!=="Finalizado"),d=arr.filter(x=>x.status==="Finalizado");$("list").innerHTML=a.length?a.map(x=>card(x,"admin")).join(""):"<div class=empty>No hay marcadores.</div>";$("done").innerHTML=d.length?d.map(x=>card(x,"admin")).join(""):"<div class=empty>No hay finalizados.</div>";acts(arr)})}
function plan(){if(!$("planilleroApp"))return;$("planilleroApp").innerHTML=header("Planillero APF","Llevá los puntos.",`<a class=btn href=admin.html>Admin</a><a class=btn href=publico.html>Público</a>`)+`<div class=card><h2>Partidos</h2><div id=list class=list></div></div></div>`;listen(arr=>{let a=arr.filter(x=>x.status!=="Finalizado");$("list").innerHTML=a.length?a.map(x=>card(x,"plan")).join(""):"<div class=empty>No hay partidos.</div>";acts(arr)})}
function pub(){if(!$("publicApp"))return;$("publicApp").innerHTML=header("Agrupación Pádel Friense","Marcadores en vivo.",`<a class=btn href=tv.html>TV</a>`)+`<div class=card><h2>En vivo</h2><div id=live class=list></div></div><div class=card><h2>Finalizados</h2><div id=done class=list></div></div></div>`;listen(arr=>{let l=arr.filter(x=>x.status==="En vivo"&&x.publicVisible),d=arr.filter(x=>x.status==="Finalizado");$("live").innerHTML=l.length?l.map(x=>card(x,"public")).join(""):"<div class=empty>No hay partidos en vivo.</div>";$("done").innerHTML=d.length?d.map(x=>card(x,"public")).join(""):"<div class=empty>No hay finalizados.</div>"})}
function tv(){if(!$("tvApp"))return;document.body.className="tv";$("tvApp").innerHTML=`<div class=tvbox><div class=tvtop><div><b id=c>APF</b><br><span id=i>Marcador</span></div><div class=timer id=tm>00:00</div><div><span class=pill id=st>En vivo</span></div></div><div class=tvmain><section class=team id=ta><div class=pair id=a>Pareja A</div><div class=names id=na>A1 / A2</div><div class=pt id=pa>0</div></section><aside class=center><div class=sets><div>🎾</div><div><b id=s0>0-0</b></div><div><b id=s1>0-0</b></div><div><b id=s2>0-0</b></div><div class=vs>VS</div></div></aside><section class=team id=tb><div class=pair id=b>Pareja B</div><div class=names id=nb>B1 / B2</div><div class=pt id=pb>0</div></section></div><div class=tvbot><span class=pill id=sv>🎾 Saca</span><span class=pill id=sp>ESPACIO SPONSOR</span></div></div>`;listen(arr=>{let id=location.hash.replace("#",""),m=arr.find(x=>x.id===id)||arr.find(x=>x.status==="En vivo")||arr[0];if(!m)return;$("c").textContent=m.competition||"APF";$("i").textContent=inf(m);$("tm").textContent=fmt(m.seconds);$("st").textContent=m.status;$("a").textContent=m.team1||"Pareja A";$("b").textContent=m.team2||"Pareja B";$("na").textContent=(m.p1||"A1")+" / "+(m.p2||"A2");$("nb").textContent=(m.p3||"B1")+" / "+(m.p4||"B2");$("pa").textContent=pt(m,0);$("pb").textContent=pt(m,1);for(let n=0;n<3;n++)$("s"+n).textContent=(m.games?.[n]?.[0]||0)+"-"+(m.games?.[n]?.[1]||0);$("ta").classList.toggle("srv",m.serving===0);$("tb").classList.toggle("srv",m.serving===1);$("sv").textContent="🎾 Saca "+(m.serving===0?(m.team1||"Pareja A"):(m.team2||"Pareja B"));$("sp").textContent=m.sponsor||"ESPACIO SPONSOR"})}
document.addEventListener("DOMContentLoaded",()=>{admin();plan();pub();tv();setInterval(tick,1000)})
</script></body></html>
