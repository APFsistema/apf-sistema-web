function renderZones(t,c){const zones=zoneNames(c.groups);t.innerHTML=`<div class="actions"><button onclick="autoZones()">Sortear zonas</button><button class="ghost" onclick="clearZones()">Limpiar zonas</button></div><br><div class="card"><h3>Armado manual</h3><div class="form-grid"><select id="manualTeam">${c.teams.map(tm=>`<option value="${tm.id}">${teamName(tm)}</option>`).join('')}</select><select id="manualZone">${zones.map(z=>`<option>${z}</option>`).join('')}</select><button onclick="assignZone()">Asignar a zona</button></div></div><br><div class="zone-grid">${zones.map(z=>`<div class="zone-card"><h3>${z}</h3>${c.teams.filter(tm=>tm.zone===z).map((tm,i)=>`<div class="team-chip"><span>${i+1}. ${teamName(tm)}</span><button class="small ghost" onclick="removeZone('${tm.id}')">Quitar</button></div>`).join('')||'<p class="muted">Sin parejas.</p>'}</div>`).join('')}</div>`}
const zoneNames=n=>Array.from({length:n},(_,i)=>'Zona '+String.fromCharCode(65+i)); function autoZones(){const c=comp();let arr=[...c.teams].sort(()=>Math.random()-.5);zoneNames(c.groups).forEach((z,i)=>arr.slice(i*c.pairsPerGroup,(i+1)*c.pairsPerGroup).forEach(t=>t.zone=z));save();renderDetail()} function clearZones(){comp().teams.forEach(t=>t.zone='');save();renderDetail()} function assignZone(){const tm=getTeam($('manualTeam').value); if(tm)tm.zone=$('manualZone').value;save();renderDetail()} function removeZone(id){const tm=getTeam(id);if(tm)tm.zone='';save();renderDetail()}
function renderFixture(t,c){const groups={};c.matches.forEach(m=>{const r=m.round||'Fixture';(groups[r]||(groups[r]=[])).push(m)});const grouped=Object.keys(groups).map(r=>`<div class="card"><h3>${r}</h3><div class="list">${groups[r].map(m=>matchLine(c,m,true)).join('')}</div></div>`).join('')||'<div class="card"><p class="muted">Todavía no hay partidos.</p></div>';t.innerHTML=`<div class="card"><h3>Configuración deportiva</h3><p class="muted">Fase: <b>${phaseLabel(c.groupPhase)}</b> · Playoffs: <b>${playoffLabel(c.playoffCross)}</b> · Grupos: <b>${formatLabel(c.matchFormat)}</b> · Playoffs: <b>${formatLabel(c.playoffMatchFormat||c.matchFormat)}</b></p></div><div class="actions"><button onclick="autoFixture()">Generar fixture automático</button><button class="ghost" onclick="generatePlayoffs()">Generar playoffs</button><button class="ghost" onclick="showManualMatchForm()">Crear partido manual</button><button class="danger" onclick="clearFixture()">Borrar fixture</button></div><div id="manualMatchBox"></div><br>${grouped}`}
function showManualMatchForm(mId=''){const c=comp();const m=mId?c.matches.find(x=>x.id===mId):null;const box=$('manualMatchBox');box.innerHTML=`<div class="card"><h3>${m?'Editar':'Crear'} partido</h3><div class="form-grid"><select id="matchA">${c.teams.map(t=>`<option value="${t.id}">${teamName(t)}</option>`).join('')}</select><select id="matchB">${c.teams.map(t=>`<option value="${t.id}">${teamName(t)}</option>`).join('')}</select><select id="matchZone">${zoneNames(c.groups).concat(['Playoffs']).map(z=>`<option>${z}</option>`).join('')}</select><input id="matchRound" placeholder="Fecha / instancia. Ej: Fecha 1 - Fase de grupos"><input id="matchTime" placeholder="Miércoles 20:00"><input id="matchCourt" placeholder="Cancha 1"><select id="matchFormat"><option value="3sets">3 sets completos</option><option value="2sets_stb">2 sets + Súper Tie-break</option><option value="1set">1 set</option></select><button onclick="saveMatch('${mId}')">Guardar partido</button></div></div>`; if(m){$('matchA').value=m.a;$('matchB').value=m.b;$('matchZone').value=m.zone;$('matchRound').value=m.round||'';$('matchTime').value=m.time;$('matchCourt').value=m.court;$('matchFormat').value=m.format||c.matchFormat||'3sets'}else{$('matchFormat').value=c.matchFormat||'3sets'}}
function saveMatch(id){const c=comp();let m=id?c.matches.find(x=>x.id===id):{id:uid('match'),a:'',b:'',zone:'',round:'Fixture',time:'',court:'',status:'Pendiente',format:comp().matchFormat||'3sets',score:blankScore()};m.a=$('matchA').value;m.b=$('matchB').value;m.zone=$('matchZone').value;m.round=$('matchRound')?.value||m.round||'Fixture';m.time=$('matchTime').value||'Horario a definir';m.court=$('matchCourt').value||'Cancha a definir';m.format=$('matchFormat')?.value||m.format||comp().matchFormat||'3sets'; if(!id)c.matches.push(m);save();renderDetail();toast('Partido guardado')}
function showResultForm(id){const c=comp();const m=c.matches.find(x=>x.id===id);if(!m)return;const s=m.score||blankScore();const box=$('manualMatchBox');box.innerHTML=`<div class="card"><h3>Cargar resultado</h3><p class="muted">${teamName(getTeam(m.a))} vs ${teamName(getTeam(m.b))}</p><div class="form-grid"><input id="resSetsA" type="number" min="0" max="3" value="${s.setsA||0}" placeholder="Sets pareja izquierda"><input id="resSetsB" type="number" min="0" max="3" value="${s.setsB||0}" placeholder="Sets pareja derecha"><input id="resGamesA" type="number" min="0" value="${s.gamesA||0}" placeholder="Games actuales izquierda"><input id="resGamesB" type="number" min="0" value="${s.gamesB||0}" placeholder="Games actuales derecha"><select id="resStatus"><option ${m.status==='Pendiente'?'selected':''}>Pendiente</option><option ${m.status==='En juego'?'selected':''}>En juego</option><option ${m.status==='Finalizado'?'selected':''}>Finalizado</option></select><button onclick="saveResult('${id}')">Guardar resultado</button></div><br><button class="ghost" onclick="clearResult('${id}')">Limpiar resultado</button></div>`}
function saveResult(id){const c=comp();const m=c.matches.find(x=>x.id===id);if(!m)return;const s=m.score||blankScore();s.setsA=Number($('resSetsA').value||0);s.setsB=Number($('resSetsB').value||0);s.gamesA=Number($('resGamesA').value||0);s.gamesB=Number($('resGamesB').value||0);s.pointsA=0;s.pointsB=0;s.status=$('resStatus').value==='Finalizado'?'FINALIZADO':'EN JUEGO';s.running=false;m.score=s;m.status=$('resStatus').value;save();renderDetail();toast('Resultado guardado y tabla actualizada')}
function clearResult(id){const c=comp();const m=c.matches.find(x=>x.id===id);if(!m)return;if(!confirm('¿Limpiar el resultado de este partido?'))return;m.score=blankScore();m.status='Pendiente';save();renderDetail();toast('Resultado limpiado')}

function autoFixture(){const c=comp();c.matches=[];zoneNames(c.groups).forEach(z=>{const teams=c.teams.filter(t=>t.zone===z); if(teams.length===4&&c.groupPhase!=='all_vs_all'){[[0,3,'Fecha 1 - Fase de grupos'],[1,2,'Fecha 1 - Fase de grupos'],[0,1,'Fecha 2 - Fase de grupos'],[2,3,'Fecha 2 - Fase de grupos']].forEach(p=>c.matches.push({id:uid('match'),a:teams[p[0]].id,b:teams[p[1]].id,zone:z,round:p[2],time:'Horario a definir',court:'Cancha a definir',status:'Pendiente',format:c.matchFormat||'3sets',score:blankScore()}))}else{let n=1;for(let i=0;i<teams.length;i++)for(let j=i+1;j<teams.length;j++){c.matches.push({id:uid('match'),a:teams[i].id,b:teams[j].id,zone:z,round:`Fecha ${Math.ceil(n/(Math.max(1,Math.floor(teams.length/2))))} - Fase de grupos`,time:'Horario a definir',court:'Cancha a definir',status:'Pendiente',format:c.matchFormat||'3sets',score:blankScore()});n++}}});save();renderDetail();toast('Fixture generado por fechas')}
function clearFixture(){if(!confirm('¿Borrar todos los partidos?'))return;comp().matches=[];save();renderDetail()}
function renderMatches(t,c){t.innerHTML=`<div class="list">${c.matches.map(m=>matchLine(c,m,true)).join('')||'<div class="card"><p class="muted">No hay partidos.</p></div>'}</div>`}
function matchLine(c,m,actions=false){const sc=m.score||blankScore();const st=(m.status||'Pendiente');const stClass=st.toLowerCase().replace(/ /g,'-');const res=matchResultText(m);const primary=st==='Finalizado'?'Ver resultado':(st==='En juego'?'Abrir marcador':'Abrir marcador');return `<div class="item"><div><b><span class="match-status ${stClass}">${st}</span>${teamName(getTeam(m.a))} vs ${teamName(getTeam(m.b))}</b><small>${m.round||'Fixture'} · ${m.zone} · ${m.time} · ${m.court} · ${formatLabel(matchFormat(m))} · ${res}</small></div>${actions?`<div class="actions"><button class="small green" onclick="openScore('${m.id}')">${primary}</button><button class="small ghost" onclick="showManualMatchForm('${m.id}')">Editar</button><button class="small ghost" onclick="showResultForm('${m.id}')">Cargar resultado</button><button class="small danger" onclick="deleteMatch('${m.id}')">Borrar</button></div>`:''}</div>`}
function deleteMatch(id){if(!confirm('¿Borrar partido?'))return;const c=comp();c.matches=c.matches.filter(m=>m.id!==id);save();renderDetail()}

function setSummary(sc){sc=normalizeScore(sc);const hist=Array.isArray(sc.setHistory)?sc.setHistory:[];let sfA=0,sfB=0,gfA=0,gfB=0;hist.forEach(r=>{const a=+r.a||0,b=+r.b||0;if(a>b)sfA++;else if(b>a)sfB++;if(!r.stb){gfA+=a;gfB+=b}});if(!hist.length){sfA=sc.setsA||0;sfB=sc.setsB||0;gfA=sc.gamesA||0;gfB=sc.gamesB||0}return {sfA,sfB,gfA,gfB,winner:sfA>sfB?'A':(sfB>sfA?'B':'')};}
function matchResultText(m){const sc=m.score||blankScore();const hist=Array.isArray(sc.setHistory)?sc.setHistory:[];if(m.status==='Finalizado'&&hist.length){return 'Resultado '+hist.map(r=>r.stb?`STB ${r.a}-${r.b}`:`${r.a}-${r.b}`).join(' / ')}return `Sets ${sc.setsA||0}-${sc.setsB||0} · Games ${sc.gamesA||0}-${sc.gamesB||0}`}
function groupFinishedMatches(c,zone){return c.matches.filter(m=>m.status==='Finalizado'&&!isPlayoffMatch(m)&&m.zone===zone)}
function headToHead(c,zone,aId,bId){const m=groupFinishedMatches(c,zone).find(x=>(x.a===aId&&x.b===bId)||(x.a===bId&&x.b===aId));if(!m)return 0;const sum=setSummary(m.score);if(!sum.winner)return 0;const winnerId=sum.winner==='A'?m.a:m.b;return winnerId===aId?-1:winnerId===bId?1:0}
function standingsRows(zone){const c=comp();const rows=c.teams.filter(t=>t.zone===zone).map(tm=>{let r={team:tm,teamName:teamName(tm),zone:tm.zone||'-',pj:0,pg:0,pp:0,sf:0,sc:0,gf:0,gc:0};groupFinishedMatches(c,zone).filter(m=>m.a===tm.id||m.b===tm.id).forEach(m=>{const sum=setSummary(m.score),isA=m.a===tm.id;const sf=isA?sum.sfA:sum.sfB,sc=isA?sum.sfB:sum.sfA,gf=isA?sum.gfA:sum.gfB,gc=isA?sum.gfB:sum.gfA;r.pj++;r.sf+=sf;r.sc+=sc;r.gf+=gf;r.gc+=gc;if(sf>sc)r.pg++;else r.pp++});return r});rows.sort((a,b)=>(b.pg-a.pg)||(b.sf-a.sf)||((b.gf-b.gc)-(a.gf-a.gc))||headToHead(c,zone,a.team.id,b.team.id)||a.teamName.localeCompare(b.teamName));return rows}
function zoneStandings(zone){return standingsRows(zone).map(x=>x.team)}
function renderTables(t,c){const zones=zoneNames(c.groups);const cards=zones.map(z=>{const rows=standingsRows(z);return `<div class="card table-wrap"><h3>${z}</h3><p class="muted">Criterio: 1) partidos ganados · 2) sets a favor · 3) diferencia de games · 4) partido entre sí.</p><table><thead><tr><th>#</th><th>Pareja</th><th>PJ</th><th>PG</th><th>PP</th><th>SF</th><th>SC</th><th>GF</th><th>GC</th><th>DG</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.teamName}</td><td>${r.pj}</td><td><b>${r.pg}</b></td><td>${r.pp}</td><td><b>${r.sf}</b></td><td>${r.sc}</td><td>${r.gf}</td><td>${r.gc}</td><td><b>${r.gf-r.gc}</b></td></tr>`).join('')||'<tr><td colspan="10" class="muted">Sin parejas en esta zona.</td></tr>'}</tbody></table></div>`}).join('');t.innerHTML=`<div class="card"><p class="muted">Tabla de fase de grupos APF. Playoffs: eliminación directa.</p></div>${cards}`}
function renderSponsors(t,c){c.sponsors=c.sponsors||[];t.innerHTML=`<div class="grid two"><div class="card sponsor-manager"><h2>Sponsors de esta competencia</h2><p class="muted">Subí solamente las imágenes/logos. El marcador los rota automáticamente en el zócalo.</p><div class="sponsor-upload"><b>Subir imágenes de sponsors</b><input id="sponsorFiles" type="file" accept="image/*" multiple><small class="muted">Podés seleccionar varias imágenes juntas.</small></div><div class="form-grid"><label>Rotación en tablero<input id="sponsorRotation" type="number" min="2" value="${c.sponsorRotation||5}"></label><label>Logos por bloque final<input id="finalSponsorBlockSize" type="number" min="4" max="12" value="${c.finalSponsorBlockSize||10}"></label><button onclick="saveSponsorConfig()">Guardar configuración</button></div><button class="ghost" onclick="clearAllSponsors()">Borrar todos los sponsors</button></div><div class="card"><h2>Vista previa</h2><div class="sponsor-live" style="position:static;height:80px;border:1px solid rgba(18,231,255,.35);border-radius:16px;display:flex;align-items:center;justify-content:center">${sponsorLiveHtml(c)}</div><p class="muted">Sponsors cargados: ${c.sponsors.length}. Bloques finales: ${Math.max(1,Math.ceil(c.sponsors.length/(c.finalSponsorBlockSize||10)))}.</p></div></div><br><div class="card"><h2>Logos cargados</h2><div class="sponsor-grid">${c.sponsors.map((sp,i)=>`<div class="sponsor-card"><div class="logo-box"><img src="${sp.src}"></div><small>Sponsor ${i+1}</small><div class="actions"><button class="small ghost" onclick="moveSponsor(${i},-1)">↑</button><button class="small ghost" onclick="moveSponsor(${i},1)">↓</button><button class="small danger" onclick="deleteSponsor(${i})">Borrar</button></div></div>`).join('')||'<p class="muted">Todavía no cargaste imágenes de sponsors.</p>'}</div></div>`;const input=$('sponsorFiles');if(input)input.onchange=e=>uploadSponsorFiles([...e.target.files])}
function renderSettings(t,c){const st=onlineSettings();t.innerHTML=`<div class="grid two"><div class="card"><h2>Editar configuración</h2><p class="muted">Modificá los datos base de esta competencia.</p><button onclick="openCompetitionForm('${c.id}');show('competitions')">Editar en formulario</button></div><div class="card"><h2>Modo público online</h2><p class="muted">Vercel publica la página. Firebase sincroniza el marcador en vivo para que la gente lo vea desde el celular.</p><label style="display:flex;gap:10px;align-items:center;margin:8px 0"><input id="onlineEnabled" type="checkbox" ${st.enabled?'checked':''}> Activar modo online</label><label>Canal / torneo<input id="onlineChannel" value="${st.channel||'apf-torneo'}" placeholder="apf-apertura-2026"></label><label>Configuración Firebase<textarea id="onlineConfig" rows="8" placeholder='{ "apiKey":"...", "authDomain":"...", "databaseURL":"...", "projectId":"...", "appId":"..." }'>${st.config||''}</textarea></label><div class="actions"><button onclick="saveOnlineForm()">Guardar online</button><button class="ghost" onclick="testOnline()">Probar/publicar</button><button class="ghost" onclick="copyPublicLink()">Copiar link público</button></div><p class="muted" style="font-size:13px">Si no activás online, el sistema sigue funcionando local como hasta ahora.</p></div></div>`}
function getTeam(id){return comp()?.teams.find(t=>t.id===id)||null} function teamName(t){return t?`${t.p1} / ${t.p2}`:'Pareja no encontrada'}
function openScoreFirst(){const c=comp(); if(!c||!c.matches[0]){toast('Primero generá un partido');return} openScore(c.matches[0].id)} function openScore(id){const c=comp();if(!c){toast('No hay competencia activa');return}const m=c.matches.find(x=>x.id===id);if(!m){toast('No se encontró el partido');return}c.activeMatchId=id;normalizeMatch(m);if(m.status==='Finalizado'){m.score.finalView=true}else{m.status='En juego';m.score.finalView=false}save();show('scoreboard')}
function backToFixture(){const c=comp();if(c){show('detail','fixture')}else show('competitions')}
function imageToDataUrl(file,maxW,maxH,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,ratio=Math.min(maxW/w,maxH/h,1);w=Math.round(w*ratio);h=Math.round(h*ratio);const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);cb(canvas.toDataURL('image/png'))};img.src=r.result};r.readAsDataURL(file)}
function uploadSponsorFiles(files){const c=comp();if(!c||!files.length)return;c.sponsors=c.sponsors||[];let left=files.length;files.forEach(file=>imageToDataUrl(file,520,220,src=>{c.sponsors.push({id:uid('sponsor'),src});left--;if(left===0){save();renderDetail();toast('Sponsors cargados')}}))}
function saveSponsorConfig(){const c=comp();if(!c)return;c.sponsorRotation=Math.max(2,Number($('sponsorRotation')?.value||5));c.finalSponsorBlockSize=Math.max(4,Number($('finalSponsorBlockSize')?.value||10));save();renderDetail();toast('Configuración de sponsors guardada')}
function deleteSponsor(i){const c=comp();if(!c)return;c.sponsors.splice(i,1);save();renderDetail();toast('Sponsor borrado')}
function clearAllSponsors(){const c=comp();if(!c||!confirm('¿Borrar todos los sponsors de esta competencia?'))return;c.sponsors=[];save();renderDetail();toast('Sponsors borrados')}
function moveSponsor(i,dir){const c=comp();if(!c)return;const j=i+dir;if(j<0||j>=c.sponsors.length)return;[c.sponsors[i],c.sponsors[j]]=[c.sponsors[j],c.sponsors[i]];save();renderDetail()}
function sponsorImages(c){return (c?.sponsors||[]).map(x=>x.src).filter(Boolean)}
function sponsorLiveHtml(c){const imgs=sponsorImages(c);if(!imgs.length)return `<span class="sponsor-live-text">${c?.sponsor||'COMERCIO LOCAL · PRESENTE JUNTO A APF'}</span>`;const per=3, step=Math.max(2,c.sponsorRotation||5), start=Math.floor(Date.now()/(step*1000))%imgs.length;let items=[];for(let i=0;i<Math.min(per,imgs.length);i++)items.push(imgs[(start+i)%imgs.length]);return items.map(src=>`<div class="sponsor-live-logo"><img src="${src}"></div>`).join('')}
function sponsorFooter(c){return `<footer class="sponsor sponsor-live">${sponsorLiveHtml(c)}</footer>`}
function finalSponsorBlock(c,m){const imgs=sponsorImages(c), size=Math.max(4,c.finalSponsorBlockSize||10);if(!imgs.length)return `<div class="final-sponsor-empty">${c?.sponsor||'COMERCIO LOCAL · PRESENTE JUNTO A APF'}</div>`;const finals=c.matches.filter(x=>x.status==='Finalizado');let idx=finals.findIndex(x=>x.id===m?.id);if(idx<0)idx=Math.max(0,finals.length-1);const blocks=Math.max(1,Math.ceil(imgs.length/size));const block=idx%blocks;const slice=imgs.slice(block*size,block*size+size);return slice.map(src=>`<div class="final-sponsor-logo"><img src="${src}"></div>`).join('')}
function finalSetDetails(s,m){let labels=matchFormat(m)==='2sets_stb'?['1° SET','2° SET','STB']:['1° SET','2° SET','3° SET'];const hist=Array.isArray(s.setHistory)?s.setHistory:[];return [0,1,2].map(i=>{const r=hist[i];const val=r?`${r.a} - ${r.b}`:'-';return `<div class="final-set-pill"><span style="color:var(--cyan)">${labels[i]}</span><br>${val}</div>`}).join('')}

gador B2'}</div></div></div>${!winA?'<div class="winner-badge">🏆 GANADORES</div>':''}</section></main><div class="final-sponsor-block">${finalSponsorBlock(c,m)}</div><button class="tools-btn final-tools" onclick="toggleTools()">⚙ Planillero</button><button class="final-tools-right" onclick="fullscreen()">Pantalla completa</button><div id="toolsPanel" class="tools-panel ${toolsOpen?'':'hidden'}"><h3>Resultado final <button class="small ghost" onclick="toggleTools(false)" style="float:right;padding:4px 8px">Cerrar</button></h3><div class="grid"><button class="wide ghost" onclick="backToFixture()">← Volver al fixture</button><button class="wide ghost" onclick="exitFinalView()">Volver al tablero</button><button class="wide green" onclick="fullscreen()">Pantalla completa</button><button class="wide" onclick="renderScoreboard()">Actualizar bloque sponsor</button></div></div></div>`}

function servePlayer(s){if(!s.servePlayer)s.servePlayer=(s.serve==='B'?'B1':'A1');s.serve=(s.servePlayer||'A1')[0];return s.servePlayer}
function serveSide(s){return servePlayer(s)[0]}
function partnerOf(player){return player==='A1'?'A2':player==='A2'?'A1':player==='B1'?'B2':'B1'}
function oppositeSide(side){return side==='A'?'B':'A'}
function setServePlayer(player,ev){if(ev)ev.stopPropagation();const s=score();if(!s)return;snap(s);s.servePlayer=player;s.serve=player[0];s.selected=s.serve;if(!Array.isArray(s.serveOrder)||!s.serveOrder.length){s.firstServePlayer=player}s.waitingSecondServer=false;save();renderScoreboard()}
function chooseSecondServer(player){const s=score();if(!s)return;const first=s.firstServePlayer||servePlayer(s);const needed=oppositeSide(first[0]);if(player[0]!==needed){toast('Elegí un jugador de la otra pareja');return}snap(s);s.serveOrder=[first,player,partnerOf(first),partnerOf(player)];s.serveIndex=1;s.servePlayer=player;s.serve=player[0];s.selected=s.serve;s.waitingSecondServer=false;s.servePromptSide='';s.status='EN JUEGO';save();renderScoreboard()}
function toggleServe(ev){if(ev)ev.stopPropagation();const s=score();if(!s)return;snap(s);const order=(Array.isArray(s.serveOrder)&&s.serveOrder.length)?s.serveOrder:['A1','A2','B1','B2'];const cur=servePlayer(s);let idx=order.indexOf(cur);if(idx<0)idx=0;idx=(idx+1)%order.length;s.serveIndex=idx;s.servePlayer=order[idx];s.serve=s.servePlayer[0];s.selected=s.serve;save();renderScoreboard()}
function advanceServeAfterGame(){const s=score();if(!s)return;const cur=servePlayer(s);const total=(s.gamesA||0)+(s.gamesB||0);if(!Array.isArray(s.serveOrder)||!s.serveOrder.length){if(total===1){s.firstServePlayer=cur;s.waitingSecondServer=true;s.servePromptSide=oppositeSide(cur[0]);s.status='ELEGIR SAQUE'}return}let idx=s.serveOrder.indexOf(cur);if(idx<0)idx=Number.isFinite(+s.serveIndex)?+s.serveIndex:0;idx=(idx+1)%s.serveOrder.length;s.serveIndex=idx;s.servePlayer=s.serveOrder[idx];s.serve=s.servePlayer[0];s.selected=s.serve}
function openCoinModal(){const s=score();if(!s)return;s.coinOpen=true;s.coinResult='';save();renderScoreboard()}
function closeCoinModal(){const s=score();if(!s)return;s.coinOpen=false;save();renderScoreboard()}
function launchCoin(){const s=score();if(!s)return;s.coinSpinning=true;s.coinResult='';save();renderScoreboard();setTimeout(()=>{const x=score();if(!x)return;x.coinSpinning=false;x.coinResult=Math.random()<.5?'CARA':'CRUZ';save();renderScoreboard()},1200)}
function openSideChange(mode='timer'){const s=score();if(!s)return;s.sideChangeOpen=true;s.sideChangeMode=mode;s.sideChangeEnd=mode==='timer'?Date.now()+60000:0;s.status=mode==='timer'?'CAMBIO DE LADO':'CAMBIO DIRECTO'}
function closeSideChange(){const s=score();if(!s)return;s.sideChangeOpen=false;s.sideChangeMode='';s.sideChangeEnd=0;if(s.status==='CAMBIO DE LADO'||s.status==='CAMBIO DIRECTO')s.status=s.tieBreak?'TIE-BREAK':(s.superTie?'SUPER TIE-BREAK':'EN JUEGO');save();renderScoreboard()}
function sideChangeHtml(s){if(!s||!s.sideChangeOpen)return '';const timer=s.sideChangeMode==='timer';const left=timer?Math.max(0,Math.ceil((s.sideChangeEnd-Date.now())/1000)):0;return `<div class="coin-overlay"><div class="coin-modal-wrap"><div class="coin-modal"><div class="coin-title">${timer?'CAMBIO DE LADO':'CAMBIO DIRECTO'}</div><div class="coin-sub">${timer?'Descanso reglamentario entre games':'Tie-break / Súper tie-break'}</div><div class="big-coin ${timer?'coin-face':'coin-cross'}" style="font-size:${timer?'58px':'42px'}">${timer?fmt(left):'↔'}</div><div class="coin-result">${timer?'Tiempo de cambio: 1 minuto':'Cambian de lado y sigue el juego'}</div><div class="coin-actions"><button class="green" onclick="closeSideChange()">Volver al tablero</button></div></div></div></div>`}
function maybeSideChangeAfterGame(){const s=score();if(!s||s.tieBreak||s.superTie)return;const total=(s.gamesA||0)+(s.gamesB||0);if(total>0&&total%2===1)openSideChange('timer')}
function maybeDirectChangeInTie(){const s=score();if(!s)return;const total=(s.pointsA||0)+(s.pointsB||0);if(total>0&&total%6===0)openSideChange('direct')}

function coinModalHtml(s,a,b){if(!s.coinOpen)return '';const res=s.coinResult||'';const spinning=!!s.coinSpinning;const coinFace=spinning?'':(res==='CRUZ'?'CRUZ':'CARA');return `<div class="coin-overlay"><div class="coin-modal-wrap"><button class="small ghost coin-close" onclick="closeCoinModal()">Cerrar</button><div class="coin-modal"><div class="coin-title">SORTEO DE SAQUE</div><div class="coin-sub">Una pareja elige CARA y la otra CRUZ</div><div class="big-coin ${spinning?'spinning':''} ${res==='CRUZ'?'coin-cross':'coin-face'}">${spinning?'':coinFace}</div><div class="coin-result">${spinning?'Girando moneda...':(res?`Resultado: ${res}`:'Tocá lanzar moneda')}</div><div class="coin-actions"><button class="green" onclick="launchCoin()" ${spinning?'disabled':''}>Lanzar moneda</button><button class="ghost" onclick="closeCoinModal()">Volver al tablero</button></div><div class="coin-sub" style="margin-top:18px">Asignar saque después del sorteo</div><div class="coin-serve-grid"><button onclick="setServePlayer('A1')">${a?.p1||'A1'}</button><button onclick="setServePlayer('A2')">${a?.p2||'A2'}</button><button onclick="setServePlayer('B1')">${b?.p1||'B1'}</button><button onclick="setServePlayer('B2')">${b?.p2||'B2'}</button></div></div></div></div>`}
function servePromptHtml(s,a,b){if(!s||!s.waitingSecondServer||s.sideChangeOpen)return '';const side=s.servePromptSide||oppositeSide((s.firstServePlayer||servePlayer(s))[0]);const opts=side==='A'?[[ 'A1',a?.p1||'A1'],['A2',a?.p2||'A2']]:[['B1',b?.p1||'B1'],['B2',b?.p2||'B2']];return `<div class="coin-overlay"><div class="coin-modal-wrap"><div class="coin-modal"><div class="coin-title">ELEGIR SAQUE</div><div class="coin-sub">Terminó el primer game. Elegí quién saca ahora de la otra pareja.</div><div class="coin-result">Después de esto el saque rota automático.</div><div class="coin-serve-grid">${opts.map(o=>`<button onclick="chooseSecondServer('${o[0]}')">${o[1]}</button>`).join('')}</div><div class="coin-actions"><button class="ghost" onclick="score().waitingSecondServer=false;score().status='EN JUEGO';save();renderScoreboard()">Lo cargo manual después</button></div></div></div></div>`}
function scorePlayerCard(side,num,photo,name,fallback){const id=side+num;const s=score()||blankScore();return `<div class="player-card ${servePlayer(s)===id?'serving-player':''}" onclick="setServePlayer('${id}',event)" title="Asignar saque a ${name||fallback}"><div class="score-photo" style="background-image:${photo?`url('${photo}')`:''}">${photo?'':initials(name,fallback)}</div><div class="serve-badge" onclick="toggleServe(event)" title="Cambiar saque">🎾</div><div class="player-name">${name||'Jugador '+fallback}</div></div>`}

function publicUrl(){const st=onlineSettings();const channel=st.channel||'apf-torneo';let path=location.pathname;if(path.endsWith('index.html')||path.endsWith('public.html'))path=path.replace(/[^\/]*$/,'');if(!path.endsWith('/'))path+='/';const base=location.origin+path;return base+'#public='+encodeURIComponent(channel)}
function copyPublicLink(){const url=publicUrl();navigator.clipboard?.writeText(url).then(()=>toast('Link público copiado')).catch(()=>{prompt('Copiá este link público',url)})}
function openPublicNew(){window.open(publicUrl(),'_blank')}
function currentSetNo(s){return Math.min(((Array.isArray(s.setHistory)?s.setHistory.length:0)+1),3)}
function publicSetVal(side,i,s){const hist=Array.isArray(s.setHistory)?s.setHistory:[];if(i<=hist.length){const r=hist[i-1];return side==='A'?r.a:r.b}const cur=currentSetNo(s);if(i===cur)return side==='A'?s.gamesA:s.gamesB;return '-'}
function publicSets(side,s,m){const f=matchFormat(m);const labels=f==='2sets_stb'?['1° SET','2° SET','STB']:['1° SET','2° SET','3° SET'];return `<div class="public-sets">${[1,2,3].map(i=>`<div class="public-set"><small>${labels[i-1]}</small><b>${publicSetVal(side,i,s)}</b></div>`).join('')}</div>`}
function publicPlayer(slot,team,photo,name,fallback,s){return `<div class="public-player"><div class="public-photo" style="background-image:${photo?`url('${photo}')`:''}">${photo?'':initials(name,fallback)}</div><div class="public-name">${name||fallback}</div>${s.servePlayer===slot?'<div class="public-ball">🎾</div>':''}</div>`}
function publicRows(c){return c.matches.slice(0,8).map(m=>`<div class="public-match"><b>${teamName(getTeam(m.a))} vs ${teamName(getTeam(m.b))}</b><small>${m.round||'Fixture'} · ${m.zone} · ${m.time} · ${m.court} · ${m.status} · Sets ${(m.score?.setsA)||0}-${(m.score?.setsB)||0}</small></div>`).join('')||'<p class="muted">Todavía no hay partidos cargados.</p>'}
function publicTableRows(c){const zones=zoneNames(c.groups);return zones.map(z=>{const rows=standingsRows(z);return `<h3 style="margin:10px 0 6px">${z}</h3><table><thead><tr><th>#</th><th>Pareja</th><th>PG</th><th>SF</th><th>DG</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.teamName}</td><td><b>${r.pg}</b></td><td>${r.sf}</td><td>${r.gf-r.gc}</td></tr>`).join('')||'<tr><td colspan="5" class="muted">Sin datos.</td></tr>'}</tbody></table>`}).join('')}
function publicSponsors(c){const list=c.sponsors||[];if(!list.length)return `<b>${c.sponsor||'APF · EN VIVO'}</b>`;const n=Math.max(1,Math.min(3,list.length));const start=Math.floor(Date.now()/Math.max(1,(c.sponsorRotation||5))*1000)%list.length;return Array.from({length:n},(_,i)=>list[(start+i)%list.length]).map(sp=>`<img class="public-sponsor-logo" src="${sp.src}">`).join('')}

function setsHtml(side,s){const f=matchFormat(activeMatch());const cur=currentSetNo(s);const labels=f==='2sets_stb'?['1° SET','2° SET','STB']:['1° SET','2° SET','3° SET'];return `<div class="sets-row">${[1,2,3].map(i=>`<div class="set-card ${i===cur?'active':''}"><small>${labels[i-1]}</small><b>${setVal(side,i,s)}</b></div>`).join('')}</div>`} function setVal(side,i,s){const hist=Array.isArray(s.setHistory)?s.setHistory:[];if(i<=hist.length){const r=hist[i-1];return side==='A'?r.a:r.b}const cur=currentSetNo(s);if(i===cur)return side==='A'?s.gamesA:s.gamesB;return '-'}
function label(v){const sc=score();if(sc&&(sc.tieBreak||sc.superTie))return String(Number.isFinite(+v)?+v:0);return points[Math.max(0,Math.min(v||0,4))]} function initials(n,f){return n?n.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase():f} function fmt(sec){sec=Math.max(0,sec|0);const m=Math.floor(sec/60),s=sec%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`} function currentSet(s,m){let n=currentSetNo(s);const f=matchFormat(m||activeMatch());if(s&&s.superTie)return 'SUPER TIE-BREAK';if(s&&s.tieBreak)return 'TIE-BREAK';if(f==='2sets_stb'&&n>=3)return 'SUPER TIE-BREAK';if(f==='1set')return '1° SET';return n>3?'SUPER TIEBREAK':`${n}° SET`} function getElapsed(s){return (s.elapsed||0)+(s.running?Math.floor((Date.now()-s.lastTick)/1000):0)} function snap(s){s.history=Array.isArray(s.history)?s.history:[];s.history.push(JSON.stringify({...s,history:[]}));if(s.history.length>40)s.history.shift()}
function score(){const m=activeMatch();if(!m)return null;m.score=normalizeScore(m.score);return m.score}
function addPoint(side){const s=score();if(!s||s.warmup)return;snap(s);s.selected=side;const k=side==='A'?'pointsA':'pointsB',o=side==='A'?'pointsB':'pointsA';if(s.superTie){s[k]++;s.status='SUPER TIE-BREAK';if(Math.max(s.pointsA,s.pointsB)>=10&&Math.abs(s.pointsA-s.pointsB)>=2){closeSuperTie(side)}else maybeDirectChangeInTie();save();renderScoreboard();return}if(!s.tieBreak&&s.gamesA===6&&s.gamesB===6){s.tieBreak=true;s.pointsA=0;s.pointsB=0;s.status='TIE-BREAK'}if(s.tieBreak){s[k]++;s.status='TIE-BREAK';if(Math.max(s.pointsA,s.pointsB)>=7&&Math.abs(s.pointsA-s.pointsB)>=2){closeTieBreak(side)}else maybeDirectChangeInTie();save();renderScoreboard();return}if(s[k]===2&&s[o]===3){s.pointsA=4;s.pointsB=4;s.status='PUNTO DE ORO'}else if(s[k]<3)s[k]++;else if(s[k]===3&&s[o]<3)winGame(side);else if(s[k]===3&&s[o]===3){s.pointsA=4;s.pointsB=4;s.status='PUNTO DE ORO'}else winGame(side);save();renderScoreboard()}
function minusPoint(side){const s=score();if(!s||s.warmup)return;snap(s);s.selected=side;const k=side==='A'?'pointsA':'pointsB';if(s[k]>0)s[k]--;s.status='EN JUEGO';save();renderScoreboard()}
function winGame(side){const s=score();if(!s)return;const k=side==='A'?'gamesA':'gamesB';s[k]++;s.pointsA=0;s.pointsB=0;s.status='EN JUEGO';advanceServeAfterGame();const a=s.gamesA,b=s.gamesB;if(a===6&&b===6){s.tieBreak=true;s.pointsA=0;s.pointsB=0;s.status='TIE-BREAK';return}if((a>=6||b>=6)&&Math.abs(a-b)>=2){closeSet(a>b?'A':'B');return}maybeSideChangeAfterGame()}
function closeTieBreak(winner){const s=score();if(!s)return;s.tieBreak=false;if(winner==='A'){s.gamesA=7;s.gamesB=6}else{s.gamesA=6;s.gamesB=7}closeSet(winner)}
function startSuperTie(){const s=score();if(!s)return;s.gamesA=0;s.gamesB=0;s.pointsA=0;s.pointsB=0;s.tieBreak=false;s.superTie=true;s.status='SUPER TIE-BREAK'}
function closeSuperTie(winner){const s=score();if(!s)return;s.setHistory=Array.isArray(s.setHistory)?s.setHistory:[];s.setHistory.push({a:s.pointsA,b:s.pointsB,stb:true});if(winner==='A')s.setsA++;else s.setsB++;s.pointsA=0;s.pointsB=0;s.gamesA=0;s.gamesB=0;s.tieBreak=false;s.superTie=false;s.status='EN JUEGO';finishMatch()}
function closeSet(winner){const s=score();if(!s)return;s.setHistory=Array.isArray(s.setHistory)?s.setHistory:[];s.setHistory.push({a:s.gamesA,b:s.gamesB});if(winner==='A')s.setsA++;else s.setsB++;s.gamesA=0;s.gamesB=0;s.pointsA=0;s.pointsB=0;s.tieBreak=false;s.superTie=false;s.status='EN JUEGO';const f=matchFormat(activeMatch());if(f==='1set'||s.setsA>=2||s.setsB>=2){finishMatch();return}if(f==='2sets_stb'&&s.setsA===1&&s.setsB===1){startSuperTie();return}}
function toggleTimer(){const s=score();if(!s)return;if(s.running){s.elapsed=getElapsed(s);s.running=false;s.lastTick=0}else{s.running=true;s.lastTick=Date.now();s.status='EN JUEGO'}save();renderScoreboard()}
function resetTimer(){const s=score();if(!s)return;s.elapsed=0;s.running=false;s.lastTick=0;save();renderScoreboard()}
function warmup(sec){const s=score();if(!s)return;s.warmup=true;s.warmupDone=false;s.warmupLen=sec;s.warmupEnd=Date.now()+sec*1000;s.status='CALENTAMIENTO';s.running=false;s.lastTick=0;save();renderScoreboard()}
function exitWarmup(){const s=score();if(!s)return;s.warmup=false;s.warmupDone=false;s.status='EN JUEGO';save();renderScoreboard()}
function startMatchFromWarmup(){const s=score();if(!s)return;s.warmup=false;s.warmupDone=false;s.status='EN JUEGO';if(!s.running){s.running=true;s.lastTick=Date.now()}save();renderScoreboard()}
function exitFinalView(){const s=score();if(!s)return;s.finalView=false;save();renderScoreboard()}

function undoScore(){const s=score();if(!s||!s.history.length)return;const h=s.history;const old=JSON.parse(h.pop());Object.assign(s,old,{history:h});save();renderScoreboard()}
function resetScore(){const m=activeMatch();if(!m)return;m.score=blankScore();save();renderScoreboard()}
function finishMatch(){const m=activeMatch(),s=score();if(!m||!s)return;m.status='Finalizado';s.status='FINALIZADO';s.running=false;s.warmup=false;s.warmupDone=false;s.sideChangeOpen=false;s.finalView=true;save();renderScoreboard();nav();toast('Partido finalizado: fixture y tabla actualizados')}
function coinFlip(){openCoinModal()}
function toggleTools(force){if(typeof force==='boolean')toolsOpen=force;else toolsOpen=!toolsOpen;renderScoreboard()}
function fullscreen(){document.body.classList.add('tv-mode');const el=document.documentElement; if(!document.fullscreenElement){el.requestFullscreen?.()}else{document.exitFullscreen?.()}}
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement&&db.screen==='scoreboard')document.body.classList.add('tv-mode')});
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;const s=score(); if(!s)return; if(e.key==='ArrowLeft')s.selected='A'; if(e.key==='ArrowRight')s.selected='B'; if(e.key==='ArrowUp')addPoint(s.selected); if(e.key==='ArrowDown')minusPoint(s.selected); if(e.key.toLowerCase()==='z')undoScore(); if(e.code==='Space'){e.preventDefault();toggleTimer()} save();renderScoreboard()});
$('demoBtn').onclick=()=>{const c=blankCompetition();let names=[['Sebastián Peñaflor','Jeremías Ávila'],['Maxi Paz','Esteban Sabagh'],['Benja Tahuil','Julián Alderete'],['Juan Chomer','Marcos Orellana'],['Nico Cejas','Mateo Cejas'],['Jose Vergara','Gaston Llapur'],['Alvaro Herrera','Adrian Vega'],['German Cerezo','Ignacio Centuperis']];c.teams=names.map(n=>({id:uid('team'),p1:n[0],p2:n[1],photo1:'',photo2:'',zone:''}));c.sponsors=Array.from({length:12},(_,i)=>({id:uid('sponsor'),src:`data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="320" height="120" viewBox="0 0 320 120"><rect width="320" height="120" rx="18" fill="%23040f20"/><text x="160" y="62" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="%23ffffff">SPONSOR ${i+1}</text><circle cx="52" cy="60" r="24" fill="%2312e7ff" opacity=".9"/></svg>`)}`}));db.competitions=[c];db.activeCompId=c.id;autoZones();autoFixture();save();show('detail','summary')};$('clearBtn').onclick=()=>{if(confirm('¿Borrar todos los datos?')){localStorage.removeItem('apf_v57_sponsors');db={competitions:[],activeCompId:null,screen:'competitions',tab:'summary'};render()}};
window.addEventListener('storage',()=>{db=JSON.parse(localStorage.getItem('apf_v57_sponsors')||'null')||db;render()});
setInterval(()=>{const s=score();if(s?.warmup && !s.warmupDone && Date.now()>=s.warmupEnd){s.warmupDone=true;s.status='LISTOS PARA COMENZAR';save()} if(s?.sideChangeOpen && s.sideChangeMode==='timer' && Date.now()>=s.sideChangeEnd){s.sideChangeOpen=false;s.sideChangeMode='';s.sideChangeEnd=0;if(s.status==='CAMBIO DE LADO')s.status='EN JUEGO';save()} if(db.screen==='scoreboard')renderScoreboard(); if(db.screen==='public')renderPublicPage()},1000);
if(PUBLIC_ONLY_PAGE){db.screen='public';}
if(location.hash.startsWith('#public=')){const hp=hashParams();db.activeCompId=hp.public||'apf-torneo';db.screen='public';document.body.classList.add('public-mode');startPublicOnlineFromHash()}
render();
</script>
