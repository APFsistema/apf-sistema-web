<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TV APF</title><style>
:root{
  --bg:#07130f; --panel:#0f231b; --panel2:#132d22; --line:#214637;
  --lime:#b7ff3c; --green:#19c46b; --text:#f4fff8; --muted:#a8c0b4;
  --warn:#ffcf4a; --danger:#ff6b6b;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#173927,#07130f 55%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:16px}
.header{display:flex;gap:14px;align-items:center;justify-content:space-between;padding:14px 0;position:sticky;top:0;background:rgba(7,19,15,.92);backdrop-filter:blur(10px);z-index:5;border-bottom:1px solid rgba(183,255,60,.12)}
.brand{display:flex;gap:12px;align-items:center}
.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--lime),var(--green));display:grid;place-items:center;color:#06110d;font-weight:900}
.brand h1{font-size:18px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}
.nav{display:flex;gap:8px;overflow:auto;padding:8px 0}.nav button,.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;padding:10px 13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn.primary,.nav button.active{background:linear-gradient(135deg,var(--lime),var(--green));color:#06110d;border:0}
.btn.warn{background:#3a2d11;border-color:#6b551d;color:#ffe58a}.btn.danger{background:#421a1a;border-color:#783333;color:#ffd0d0}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 12;background:rgba(15,35,27,.94);border:1px solid rgba(183,255,60,.12);border-radius:22px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
.card h2,.card h3{margin:0 0 8px}.muted{color:var(--muted);font-size:13px}
.hero{padding:24px}.hero h2{font-size:30px}.pill{display:inline-block;background:rgba(183,255,60,.12);border:1px solid rgba(183,255,60,.22);color:var(--lime);padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.action{background:#10291f;border:1px solid var(--line);border-radius:18px;padding:14px;min-height:88px}.action b{display:block}.action span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#0b1d16;border:1px solid var(--line);border-radius:16px;padding:12px}.stat strong{font-size:24px;display:block;color:var(--lime)}
.formgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}label{display:block;color:var(--muted);font-size:12px;margin:4px 0}input,select,textarea{width:100%;padding:11px;border-radius:12px;border:1px solid var(--line);background:#071913;color:var(--text)}textarea{min-height:70px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}.hidden{display:none!important}
.list{display:grid;gap:10px}.item{background:#0a1b14;border:1px solid var(--line);border-radius:16px;padding:12px;display:flex;justify-content:space-between;gap:10px;align-items:center}
.item small{color:var(--muted)}.tabs{display:flex;gap:8px;overflow:auto;margin:10px 0}.tabs button{flex:0 0 auto}
.login{max-width:420px;margin:40px auto}.center{text-align:center}
.live-card{border:1px solid rgba(183,255,60,.18);border-radius:22px;background:linear-gradient(180deg,#122d22,#0a1b14);padding:14px}
.live-head{text-align:center}.live-head h3{font-size:18px}.live-meta{color:var(--muted);font-size:12px}
.score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-top:12px}
.pair{text-align:center}.pair b{display:block;font-size:15px}.photos{display:flex;justify-content:center;gap:5px;margin-top:8px}.photo{width:34px;height:34px;border-radius:50%;background:#1b4231;border:1px solid var(--line);display:grid;place-items:center;color:var(--lime);font-size:11px;overflow:hidden}.photo img{width:100%;height:100%;object-fit:cover}
.vs{text-align:center;color:var(--muted);font-weight:900}.score{display:block;color:var(--lime);font-size:32px;line-height:1.1}.sets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:10px}
.sponsor-strip{margin-top:10px;text-align:center;border-top:1px solid var(--line);padding-top:10px}.sponsor-logos{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.sponsor-logo{min-width:62px;min-height:30px;border-radius:10px;background:#10291f;border:1px solid var(--line);display:grid;place-items:center;color:var(--lime);font-size:11px;padding:4px}
.empty{border:1px dashed var(--line);border-radius:18px;padding:16px;text-align:center;color:var(--muted)}
@media(max-width:760px){
 .wrap{padding:10px}.header{align-items:flex-start}.brand h1{font-size:15px}.logo{width:42px;height:42px}
 .hero h2{font-size:24px}.actions{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}
 .formgrid{grid-template-columns:1fr}.item{display:block}.item .row{margin-top:10px}
 .score-row{grid-template-columns:1fr auto 1fr;gap:6px}.score{font-size:28px}.pair b{font-size:13px}.photo{width:30px;height:30px}
 .card{border-radius:18px;padding:13px}
}
 body{background:#020806} .wrap{max-width:1400px}</style></head><body><div class="wrap"><div class="card hero center"><h2>APF TV</h2><p class="muted">Marcador para pantalla/transmisión</p><div id="tvLive"></div></div></div><script>
const APF_KEY='apf_base_estable_v1';
const USERS={admin:'APF2026',planillero:'PLANILLA2026'};
function emptyDB(){return {competitions:[],matches:[],sponsors:[],ranking:[],settings:{publicVisible:true}}}
function db(){try{return {...emptyDB(),...(JSON.parse(localStorage.getItem(APF_KEY))||{})}}catch(e){return emptyDB()}}
function save(d){localStorage.setItem(APF_KEY,JSON.stringify(d)); render&&render()}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function login(role){
 const u=document.getElementById('user').value.trim(), p=document.getElementById('pass').value.trim();
 if((role==='admin'&&u==='admin'&&p===USERS.admin)||(role==='planillero'&&u==='planillero'&&p===USERS.planillero)){
   localStorage.setItem('apf_session',role); location.href=role==='admin'?'admin.html':'planillero.html';
 } else alert('Usuario o contraseña incorrectos');
}
function logout(){localStorage.removeItem('apf_session'); location.href='index.html'}
function requireRole(role){if(localStorage.getItem('apf_session')!==role){document.body.innerHTML='<div class="wrap login card center"><h2>Acceso restringido</h2><p class="muted">Ingresá con tu usuario y contraseña.</p><a class="btn primary" href="'+role+'.html">Ingresar</a></div>'; return false} return true}
function pubMatches(){return db().matches.filter(m=>m.publicado && m.estado!=='Finalizado')}
function finishedToday(){const now=new Date(); const limit=new Date(now); limit.setHours(8,0,0,0); if(now<limit) limit.setDate(limit.getDate()-1); return db().matches.filter(m=>m.estado==='Finalizado' && (m.finishedAt||0)>=limit.getTime())}
function renderMatch(m,compact=false){
 const p1=m.p1||'Pareja 1', p2=m.p2||'Pareja 2', score=m.score||[0,0], sets=m.sets||['0-0','0-0','0-0'];
 const meta=[m.instancia,m.categoria,m.cancha,m.horario].filter(Boolean).join(' · ');
 const sp=db().sponsors.filter(s=>s.estado!=='Inactivo' && (s.tipo==='Sponsor de marcador'||s.tipo==='General APF')).slice(0,innerWidth<760?3:5);
 return `<div class="live-card">
  <div class="live-head"><h3>${esc(p1)} vs ${esc(p2)}</h3><div class="live-meta">${esc(m.competencia||'APF')} · ${esc(meta||'Partido publicado')}</div><div class="live-meta">🟢 ${esc(m.estado||'En juego')} · Tiempo: ${esc(m.tiempo||'00:00')}</div></div>
  <div class="score-row">
   <div class="pair"><b>${esc(p1)}${m.saque==='1'?' 🎾':''}</b><div class="photos"><span class="photo">F1</span><span class="photo">F2</span></div></div>
   <div class="vs">VS<span class="score">${esc(score[0])} - ${esc(score[1])}</span></div>
   <div class="pair"><b>${esc(p2)}${m.saque==='2'?' 🎾':''}</b><div class="photos"><span class="photo">F1</span><span class="photo">F2</span></div></div>
  </div>
  <div class="sets">${sets.map((s,i)=>`<span>Set ${i+1}: ${esc(s)}</span>`).join('')}</div>
  <div class="sponsor-strip"><small>Acompañan este partido</small><div class="sponsor-logos">${sp.length?sp.map(s=>`<div class="sponsor-logo">${esc(s.nombre)}</div>`).join(''):'<div class="muted">Sin sponsors activos</div>'}</div></div>
 </div>`
}
function empty(msg){return `<div class="empty">${esc(msg)}</div>`}

function render(){const live=pubMatches(); tvLive.innerHTML=live.length?live.map(m=>renderMatch(m)).join(''):empty('No hay marcador en vivo publicado.')} render(); setInterval(render,1500);
</script></body></html>
